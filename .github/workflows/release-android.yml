name: Android-build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Test en maak Android-configuratie
        env:
          SYNC_SERVER_URL: https://moviepass-groepsboeker-sync.onrender.com
          GITHUB_REPOSITORY_URL: https://github.com/Kevin2296/MoviePassGroupBooker
        run: |
          npm test
          npm run prepare:android

      - name: Bouw test-APK
        run: gradle -p android :app:assembleDebug

      - name: Bewaar test-APK
        uses: actions/upload-artifact@v4
        with:
          name: MoviePassGroupBooker-debug
          path: android/app/build/outputs/apk/debug/*.apk

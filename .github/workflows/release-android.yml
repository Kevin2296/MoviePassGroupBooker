name: Android-release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Test en maak openbare Android-configuratie
        env:
          SYNC_SERVER_URL: ${{ secrets.SYNC_SERVER_URL }}
          GITHUB_REPOSITORY_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          test -n "$SYNC_SERVER_URL"
          npm test
          npm run prepare:android

      - name: Herstel releasesleutel
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/release.jks

      - name: Bouw APK en Android App Bundle
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: gradle -p android :app:assembleRelease :app:bundleRelease

      - name: Bewaar buildbestanden
        uses: actions/upload-artifact@v4
        with:
          name: moviepass-groepsboeker-android
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/bundle/release/*.aab

      - name: Publiceer GitHub Release bij een versietag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/bundle/release/*.aab
